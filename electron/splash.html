<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'unsafe-inline';" />
  <title>Forge Mail — Loading</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      -webkit-app-region: drag;
      user-select: none;
    }

    .card {
      background: #0e0e18;
      border: 1px solid rgba(139, 92, 246, 0.25);
      border-radius: 20px;
      padding: 48px 52px;
      text-align: center;
      width: 380px;
      box-shadow:
        0 0 80px rgba(139, 92, 246, 0.12),
        0 32px 64px rgba(0,0,0,0.6);
      animation: appear 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes appear {
      from { opacity: 0; transform: scale(0.92) translateY(8px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    .icon-wrap {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      box-shadow: 0 8px 32px rgba(124, 58, 237, 0.4);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 8px 32px rgba(124, 58, 237, 0.4); }
      50%       { box-shadow: 0 8px 48px rgba(124, 58, 237, 0.7); }
    }

    .icon-wrap svg {
      width: 30px; height: 30px;
      fill: none;
      stroke: #fff;
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #f8f8ff;
      letter-spacing: -0.3px;
      margin-bottom: 8px;
    }

    .tagline {
      font-size: 13px;
      color: rgba(248, 248, 255, 0.45);
      margin-bottom: 36px;
      letter-spacing: 0.2px;
    }

    .loader {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .dot {
      width: 7px; height: 7px;
      background: #7c3aed;
      border-radius: 50%;
      animation: bounce 1.2s ease-in-out infinite;
    }
    .dot:nth-child(1) { animation-delay: 0s; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.7); opacity: 0.4; }
      40%            { transform: scale(1);   opacity: 1; }
    }

    .status {
      margin-top: 20px;
      font-size: 11px;
      color: rgba(248, 248, 255, 0.3);
      letter-spacing: 0.6px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon-wrap">
      <!-- Zap icon (inline SVG) -->
      <svg viewBox="0 0 24 24">
        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
      </svg>
    </div>
    <h1>Forge Mail</h1>
    <p class="tagline">Send emails with surgical precision.</p>
    <div class="loader">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
    <p class="status">Starting backend…</p>
  </div>
</body>
</html>
